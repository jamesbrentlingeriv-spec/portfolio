<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word Witness — James Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="screenshot-preview.css">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --border: #1e1e2e;
            --accent: #7c3aed;
            --accent2: #06b6d4;
            --text: #e2e8f0;
            --muted: #64748b;
            --radius: 12px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 6%;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--accent);
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
        }

        section {
            padding: 8rem 6% 6rem;
        }

        .section-title {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            text-align: center;
            margin-bottom: 1rem;
        }

        .section-sub {
            color: var(--muted);
            text-align: center;
            max-width: 600px;
            margin: 0 auto 3rem;
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
            padding-top: 6rem;
        }

        .hero-img {
            position: relative;
        }

        .hero-img video {
            width: 100%;
            max-width: 700px;
            aspect-ratio: 16/9;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
            object-fit: cover;
        }

        .hero-text {
            text-align: center;
            max-width: 700px;
        }

        .hero-text h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .btn {
            padding: 0.9rem 2rem;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all .2s;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: #6d28d9;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
        }

        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .description {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 800px;
            margin: 3rem auto;
        }

        .description h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        .description p {
            font-size: 1.1rem;
            color: var(--muted);
            margin-bottom: 1.5rem;
        }

        @media (max-width: 768px) {
            section {
                padding: 6rem 4% 4rem;
            }

            nav {
                padding: 1rem 4%;
            }
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">james<span>.</span></div>
        <a href="index.html">← Back to Portfolio</a>
    </nav>
    <section>
        <h1 class="section-title">Word Witness</h1>
        <p class="section-sub">Helps kids learn to read through Bible stories.</p>
        <div class="hero">
            <div class="hero-img">
                <video src="wordwitness.mp4" autoplay loop muted playsinline
                    style="width:100%; border-radius:14px; border:1px solid rgba(255,255,255,0.08); box-shadow:0 30px 80px rgba(0,0,0,0.6);"></video>
            </div>
            <div class="hero-text">
                <a href="https://word-witness-840075680860.us-west1.run.app/" target="_blank"
                    class="btn btn-primary">Try Live App →</a>
                <a href="index.html" class="btn btn-outline">Back to Portfolio</a>
            </div>
        </div>
        <iframe src="wordwitness/README.md" style="width:100%; height:70vh; border:none; border-radius:14px;"></iframe>
    </section>
</body>

</html>
